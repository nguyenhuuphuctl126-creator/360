<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Trình xem Video 360 Độ</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <div id="overlay" style="position: absolute; z-index: 10; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); color: white; cursor: pointer;">
      <h1>Nhấn vào đây để xem Video 360</h1>
    </div>

    <a-scene>
      <a-assets>
        <video id="video360" 
               src="https://github.com/nguyenhuuphuctl126-creator/360/releases/download/v1/voi.mp4" 
               loop="true" 
               crossorigin="anonymous" 
               playsinline 
               webkit-playsinline>
        </video>
      </a-assets>
      
      <a-videosphere src="#video360" rotation="0 -90 0"></a-videosphere>
      <a-camera position="0 0 0"></a-camera>
    </a-scene>

    <script>
      const overlay = document.getElementById('overlay');
      const video = document.querySelector('#video360');

      overlay.addEventListener('click', function () {
        overlay.style.display = 'none'; // Ẩn nút nhấn đi
        video.play(); // Bắt đầu phát video
      });
    </script>
  </body>
</html>
